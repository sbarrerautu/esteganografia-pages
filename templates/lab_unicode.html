<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taller de Esteganografía - Laboratorio Unicode</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=asset_version) }}">
</head>
<body data-page="lab-unicode" data-nav-key="lab-unicode">
  {% include "_navbar.html" %}
  <main class="shell">
    <section class="card">
      <h1>Laboratorio Unicode Invisible</h1>
      <p class="subtitle">Práctica de cifrado y descifrado con caracteres invisibles (zero-width).</p>
      <div class="stack">
        <label for="lab3-visible-text">Texto visible</label>
        <input id="lab3-visible-text" type="text" placeholder="Texto normal">
        <label for="lab3-key-text">Mensaje oculto</label>
        <input id="lab3-key-text" type="text" placeholder="Clave o mensaje">
        <button id="lab3-encode-btn" type="button">Ocultar información</button>
        <button id="lab3-copy-btn" type="button" disabled>Copiar texto oculto</button>
        <button id="lab3-download-btn" type="button" disabled>Descargar texto .txt</button>
        <label for="lab3-encoded-output">Texto con ocultación</label>
        <textarea id="lab3-encoded-output" readonly></textarea>
        <p id="lab3-meta" class="mini"></p>
      </div>
      <div class="stack">
        <label for="lab3-decode-input">Texto para descifrar</label>
        <textarea id="lab3-decode-input"></textarea>
        <button id="lab3-decode-btn" type="button">Descifrar</button>
        <label for="lab3-decoded-output">Resultado</label>
        <input id="lab3-decoded-output" type="text" readonly>
        <p id="lab3-feedback" class="feedback" aria-live="polite"></p>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/navbar.js', v=asset_version) }}"></script>
  <script src="{{ url_for('static', filename='js/game.js', v=asset_version) }}"></script>
</body>
</html>
