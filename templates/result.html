<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taller de Esteganografía - Resultado</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=asset_version) }}">
</head>
<body data-page="result" data-nav-key="resultado">
  {% include "_navbar.html" %}
  <main class="shell">
    <section class="card">
      <h1>Resultado Final</h1>
      <p class="subtitle">Resumen de tu desempeño en los 5 niveles.</p>
      <dl id="result-list" class="result-list">
        <div><dt>Nickname</dt><dd id="r-nickname">-</dd></div>
        <div><dt>Tiempo total</dt><dd id="r-time">-</dd></div>
        <div><dt>Puntaje</dt><dd id="r-score">-</dd></div>
        <div><dt>Respuestas correctas</dt><dd id="r-correct">-</dd></div>
      </dl>
      <section>
        <h2>Tiempos por nivel</h2>
        <ul id="level-times"></ul>
      </section>
      <p id="result-feedback" class="feedback" aria-live="polite"></p>
      <div class="row">
        <a class="button-link" href="/examen-final">Ir al test final rápido</a>
        <a class="button-link" href="/">Jugar de nuevo</a>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/navbar.js', v=asset_version) }}"></script>
  <script src="{{ url_for('static', filename='js/game.js', v=asset_version) }}"></script>
</body>
</html>
